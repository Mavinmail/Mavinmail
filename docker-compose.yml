services:
  db:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: mavinmail
      POSTGRES_PASSWORD: mavinmail
      POSTGRES_DB: mavinmail
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  backend:
    build:
      context: ./apps/backend
    ports:
      - "3001:3001"
    env_file:
      - ./apps/backend/.env
    depends_on:
      - db
    restart: unless-stopped

  dashboard:
    build:
      context: ./apps/dashboard
    ports:
      - "3000:3000"
    env_file:
      - ./apps/dashboard/.env
    depends_on:
      - backend
    restart: unless-stopped

  extension:
    build:
      context: ./apps/extension
    ports:
      - "8080:80"
    restart: unless-stopped

volumes:
  pgdata:
